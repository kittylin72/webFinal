<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>網球 - AI 主動進攻版</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 1000px;
            height: 680px;
            border: 4px solid #555;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            background: #111;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        .ui-panel {
            margin-top: 12px;
            text-align: center;
            color: #ddd;
            font-size: 16px;
        }

        b {
            color: #d4ff00;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .message-box {
            background: #222f3d;
            border: 4px solid #f1c40f;
            padding: 28px 30px;
            text-align: center;
            border-radius: 16px;
            max-width: 520px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            animation: popIn 0.25s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .message-box h2 {
            color: #f1c40f;
            margin: 0 0 18px;
            font-size: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
        }

        .message-box p {
            color: #f0f0f0;
            font-size: 17px;
            line-height: 1.6;
            margin: 0 0 22px;
        }

        .message-box button {
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            padding: 12px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .message-box button:hover {
            background: #f39c12;
            transform: scale(1.05);
        }

        .message-box button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <h2 style="margin: 12px 0 10px; text-align: center;">網球 - AI 進攻強化版</h2>
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="ui-overlay">
            <div class="message-box">
                <h2>遊戲規則</h2>
                <p>使用方向鍵控制球拍上下左右移動。按空白鍵發球後，盡量回擊電腦的球並守住自己的出界線。</p>
                <p>先取得 3 分者獲勝。</p>
                <button id="start-button" onclick="startGame()">開始遊戲</button>
            </div>
        </div>
    </div>
    <div class="ui-panel">
        操作：<b>方向鍵</b> 移動 | <b>空白鍵</b> 玩家發球<br>
        <small style="color: #bbb;">提示：遊戲結束時，<b>按空白鍵</b>即可結算並返回主地圖。</small>
    </div>
    <script src="tennis.js"></script>
</body>
</html>
